name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test

  required-checks:
    name: Required checks
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Ensure validation matrix passed
        run: |
          if [ "${{ needs.validate.result }}" != "success" ]; then
            echo "Validation matrix failed"
            exit 1
          fi
